version: '3.9'
services:
  db:
    image: postgres:16
    container_name: staff-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: staff-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - /data/uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s
    command: >
      sh -c "npx prisma migrate deploy && npm run prisma:seed && npm run start"
